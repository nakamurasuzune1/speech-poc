<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>音声入力 PoC（30分対応）</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-right: 10px;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div id="summary" style="
  font-size: 28px;
  font-weight: bold;
  color: #d32f2f;
  margin-bottom: 20px;
">
  （計測未実施）
</div>
<h1>音声入力 PoC</h1>

<p>
  本PoCでは音声を保存せず、<br>
  マイク入力を用いてキーワード出現傾向を確認します。
</p>

<button onclick="startRecognition()">🎤 計測開始</button>
<button onclick="stopRecognition()">⏹ 計測停止</button>

<div id="result">（待機中）</div>

<script>
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  let recognition;
  let isRunning = false;

  // ★ カウンター
  let irasshaimaseCount = 0;

  // ★ 重複防止用
  let lastFinalTranscript = "";

  function startRecognition() {
    if (!SpeechRecognition) {
      document.getElementById("summary").textContent =
        "このブラウザは音声入力に対応していません。";
      return;
    }

    // ★ 計測開始時にリセット
    irasshaimaseCount = 0;
    lastFinalTranscript = "";
    document.getElementById("summary").textContent = "（計測中…）";

    if (!recognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "ja-JP";
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1];
        if (!result.isFinal) return;

        const transcript = result[0].transcript.trim();
        if (transcript === lastFinalTranscript) return;

        lastFinalTranscript = transcript;

        // ★「いらっしゃいませ」をカウント（複数回対応）
        const matches = transcript.match(/いらっしゃいませ/g);
        if (matches) {
          irasshaimaseCount += matches.length;
        }
      };

      recognition.onend = () => {
        if (isRunning) {
          setTimeout(() => recognition.start(), 200);
        }
      };
    }

    isRunning = true;
    recognition.start();
  }

  function stopRecognition() {
    isRunning = false;
    if (recognition) recognition.stop();

    // ★ 結果表示（目立つ形）
    document.getElementById("summary").textContent =
      `「いらっしゃいませ」発話回数： ${irasshaimaseCount} 回`;
  }
</script>
``
</body>
</html>
