<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>音声入力 PoC（30分対応）</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-right: 10px;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>音声入力 PoC</h1>

<p>
  本PoCでは音声を保存せず、<br>
  マイク入力を用いてキーワード出現傾向を確認します。
</p>

<button onclick="startRecognition()">🎤 計測開始</button>
<button onclick="stopRecognition()">⏹ 計測停止</button>

<div id="result">（待機中）</div>

<script>
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  let recognition;
  let isRunning = false;

  function startRecognition() {
    if (!SpeechRecognition) {
      document.getElementById("result").textContent =
        "このブラウザは音声入力に対応していません。";
      return;
    }

    if (!recognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "ja-JP";
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onresult = (event) => {
        let text = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          text += event.results[i][0].transcript;
        }
        document.getElementById("result").textContent = text;
      };

      recognition.onerror = (event) => {
        console.log("error:", event.error);
      };

      recognition.onend = () => {
        if (isRunning) {
          // ★ マイク自動再起動（30分PoCのキモ）
          setTimeout(() => {
            recognition.start();
          }, 200);
        }
      };
    }

    isRunning = true;
    document.getElementById("result").textContent = "（聞き取り中…）";
    recognition.start();
  }

  function stopRecognition() {
    isRunning = false;
    if (recognition) {
      recognition.stop();
    }
    document.getElementById("result").textContent = "（停止）";
  }
</script>

</body>
</html>
