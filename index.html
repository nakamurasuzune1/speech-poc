<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>音声入力 PoC（30分対応）</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-right: 10px;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>音声入力 PoC</h1>

<p>
  本PoCでは音声を保存せず、<br>
  マイク入力を用いてキーワード出現傾向を確認します。
</p>

<button onclick="startRecognition()">🎤 計測開始</button>
<button onclick="stopRecognition()">⏹ 計測停止</button>

<div id="result">（待機中）</div>

<script>
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  let recognition;
  let isRunning = false;

  // ★ 蓄積用（確定結果のみ）
  let accumulatedText = "";

  function startRecognition() {
    if (!SpeechRecognition) {
      document.getElementById("result").textContent =
        "このブラウザは音声入力に対応していません。";
      return;
    }

    if (!recognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "ja-JP";
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onresult = (event) => {
        // 重要：最後の結果だけを見る
        const lastResult = event.results[event.results.length - 1];

        // ★ 確定した発話のみ処理
        if (lastResult.isFinal) {
          const text = lastResult[0].transcript.trim();

          if (text.length > 0) {
            // 改行ではなく「スペース or 改行1つ」に制御
            accumulatedText += text + "\n";
            document.getElementById("result").textContent = accumulatedText;
          }
        }
      };

      recognition.onerror = (event) => {
        console.log("error:", event.error);
      };

      recognition.onend = () => {
        if (isRunning) {
          setTimeout(() => {
            recognition.start();
          }, 200);
        }
      };
    }

    isRunning = true;
    recognition.start();
  }

  function stopRecognition() {
    isRunning = false;
    if (recognition) recognition.stop();
  }
</script>

</body>
</html>
