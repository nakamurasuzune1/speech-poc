<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>音声入力 PoC（30分対応）</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-right: 10px;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div id="summary" style="
  font-size: 28px;
  font-weight: bold;
  color: #d32f2f;
  margin-bottom: 20px;
">
  （計測未実施）
</div>

<div id="log" style="
  border: 1px solid #ccc;
  padding: 10px;
  height: 200px;
  overflow-y: auto;
  font-size: 14px;
  white-space: pre-wrap;
">
  （発話ログ表示）
</div>
<h1>あいさつカウンター</h1>

<p>
  本実験では音声を保存せず、<br>
  マイク入力を用いてあいさつの回数（「いらっしゃいませ」の回数）を確認します。
</p>

<button onclick="startRecognition()">🎤 計測開始</button>
<button onclick="stopRecognition()">⏹ 計測停止</button>

<div id="result">（待機中）</div>

<script>
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  let recognition;
  let isRunning = false;

  // ★ カウンター
  let irasshaimaseCount = 0;

  // ★ 重複防止
  let lastFinalTranscript = "";

  // ★ 表示ログ
  let logText = "";

  // ★ 表記ゆれ対応正規表現
  const IRASSHAIMASE_REGEX = /いらっしゃいませ[ー！!。]?/g;

  function startRecognition() {
    if (!SpeechRecognition) {
      document.getElementById("summary").textContent =
        "このブラウザは音声入力に対応していません。";
      return;
    }

    // ★ 初期化
    irasshaimaseCount = 0;
    lastFinalTranscript = "";
    logText = "";
    document.getElementById("log").textContent = "";
    document.getElementById("summary").textContent = "（計測中…）";

    if (!recognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "ja-JP";
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1];
        if (!result.isFinal) return;

        const transcript = result[0].transcript.trim();
        if (!transcript || transcript === lastFinalTranscript) return;

        lastFinalTranscript = transcript;

        // ★ 発話ログ表示
        logText += transcript + "\n";
        document.getElementById("log").textContent = logText;

        // ★ 表記ゆれ対応カウント
        const matches = transcript.match(IRASSHAIMASE_REGEX);
        if (matches) {
          irasshaimaseCount += matches.length;
        }
      };

      recognition.onend = () => {
        if (isRunning) {
          setTimeout(() => recognition.start(), 200);
        }
      };
    }

    isRunning = true;
    recognition.start();
  }

  function stopRecognition() {
    isRunning = false;
    if (recognition) recognition.stop();

    document.getElementById("summary").textContent =
      `あいさつ回数： ${irasshaimaseCount} 回`;
  }
</script>
``
``
</body>
</html>
